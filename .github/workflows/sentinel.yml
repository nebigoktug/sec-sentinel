name: sec-sentinel

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sec-sentinel
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan (--once)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EDGAR_IDENTITY: ${{ secrets.EDGAR_IDENTITY }}
        run: python main.py --once

      - name: Commit and push seen.json if changed
        run: |
          if [ -z "$(git status --porcelain seen.json)" ]; then
            echo "seen.json değişmedi, commit atlanıyor."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git add seen.json
          git commit -m "seen.json güncellendi"
          git push origin "HEAD:${GITHUB_REF_NAME}"
